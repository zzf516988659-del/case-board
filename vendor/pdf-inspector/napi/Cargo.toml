[package]
name = "pdf-inspector-napi"
version = "0.2.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
pdf-inspector = { path = ".." }
napi = { version = "3.0.0", features = ["serde-json"] }
napi-derive = "3.0.0"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "debuginfo"
